<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PromoLens AI</title>
<style>
  :root{ --navy:#0f3460; --ink:#16213e; --accent:#e94560; --bg:#f4f6fb;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
  body{background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;}
  header{background:linear-gradient(135deg,#0f3460,#16213e);color:#fff;padding:16px 22px;}
  header h1{font-size:20px;}
  header span{font-size:12px;color:#a8d8ea;}
  #chat{flex:1;overflow-y:auto;padding:22px;max-width:860px;margin:0 auto;width:100%;}
  .msg{margin:12px 0;display:flex;}
  .msg .bubble{padding:12px 16px;border-radius:14px;max-width:78%;font-size:15px;line-height:1.55;white-space:pre-wrap;}
  .user{justify-content:flex-end;}
  .user .bubble{background:var(--navy);color:#fff;border-bottom-right-radius:4px;}
  .bot .bubble{background:#fff;border:1px solid #dde3ff;border-bottom-left-radius:4px;}
  .hint{color:#888;font-size:13px;text-align:center;margin:10px 0;}
  .chips{max-width:860px;margin:0 auto;padding:0 22px 6px;display:flex;gap:8px;flex-wrap:wrap;}
  .chip{background:#fff;border:1px solid #dde3ff;border-radius:18px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--navy);}
  .chip:hover{background:#eef2ff;}
  footer{max-width:860px;margin:0 auto;width:100%;padding:14px 22px 22px;display:flex;gap:10px;}
  #q{flex:1;padding:13px 16px;border:1px solid #c9d2ee;border-radius:12px;font-size:15px;}
  #send{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:0 22px;font-weight:700;cursor:pointer;}
  #send:disabled{opacity:.5;}
</style>
</head>
<body>
<header><h1>🔎 PromoLens AI</h1><span>Trade Promotion Intelligence Copilot · synthetic data</span></header>
<div class="chips" id="chips"></div>
<div id="chat"><div class="hint">Ask about scheme ROI, leakage, claims, stacking, or design a new scheme.</div></div>
<footer>
  <input id="q" placeholder="e.g. Which building-materials schemes gave the best ROI?" autocomplete="off"/>
  <button id="send">Send</button>
</footer>
<script>
  // Set after Cloud Run deploy:  window.PROMOLENS_API = "https://<service>-<hash>-as.a.run.app"
  const API = (window.PROMOLENS_API || localStorage.getItem("promolens_api") || "").replace(/\/$/,"");
  let session = null;
  const chat = document.getElementById("chat"), q = document.getElementById("q"), send = document.getElementById("send");
  const samples = [
    "Which building-materials schemes worked and which gave away margin?",
    "Which distributors have high sell-in but flat sell-out?",
    "Are any claims above the entitlement partners earned?",
    "What's the real effective discount on putty after stacking?",
    "Why didn't the tile-adhesive scheme apply, and what's active?",
    "Design a Rajasthan OPC scheme: +12% growth at 1.75% slab."
  ];
  const chips = document.getElementById("chips");
  samples.forEach(s=>{const c=document.createElement("div");c.className="chip";c.textContent=s;c.onclick=()=>{q.value=s;ask();};chips.appendChild(c);});
  function add(role,text){const m=document.createElement("div");m.className="msg "+role;const b=document.createElement("div");b.className="bubble";b.textContent=text;m.appendChild(b);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;return b;}
  async function ask(){
    const text=q.value.trim(); if(!text) return;
    if(!API){add("bot","⚠️ API endpoint not set. After deploying Cloud Run, run in console: localStorage.setItem('promolens_api','https://YOUR-RUN-URL')");return;}
    add("user",text); q.value=""; send.disabled=true;
    const b=add("bot","…thinking…");
    try{
      const r=await fetch(API+"/chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text,session_id:session})});
      const j=await r.json(); session=j.session_id||session; b.textContent=j.answer||"(no answer)";
    }catch(e){b.textContent="Error: "+e.message;}
    send.disabled=false; chat.scrollTop=chat.scrollHeight;
  }
  send.onclick=ask; q.addEventListener("keydown",e=>{if(e.key==="Enter")ask();});
</script>
</body>
</html>
